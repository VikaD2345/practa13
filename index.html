<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>VOLTEX — Магазин ноутбуков</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --surface: #16161f;
      --border: #252535;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #f0f0f5;
      --muted: #6b6b88;
      --danger: #ff4d6d;
      --success: #00ffa3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,229,255,0.4);
    }
    .logo span { color: var(--text); }

    nav {
      display: flex;
      gap: 0.25rem;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 0.4rem 1rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .nav-btn:hover, .nav-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0,229,255,0.05);
    }

    .cart-btn {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .cart-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cart-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.65rem;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 5rem 0 4rem;
      animation: fadeUp 0.6s ease;
    }
    .hero-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,229,255,0.3);
      padding: 0.3rem 1rem;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, rgba(0,229,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    /* Search */
    .search-wrap {
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 0.85rem 1rem 0.85rem 3rem;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 2rem 0 1.5rem;
    }
    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.9rem;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .filter-chip:hover, .filter-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,229,255,0.05);
    }

    /* Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,229,255,0.3);
      box-shadow: 0 12px 40px rgba(0,229,255,0.08);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #13131e 0%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      position: relative;
      overflow: hidden;
    }
    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.3) 100%);
    }

    .card-badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: var(--accent2);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
      z-index: 1;
    }
    .card-badge.sale { background: var(--danger); }
    .card-badge.new { background: var(--success); color: var(--bg); }

    .card-body { padding: 1.25rem; }
    .card-brand {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    .card-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }
    .spec-tag {
      font-size: 0.65rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .price {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }
    .price-old {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: line-through;
      margin-left: 0.5rem;
    }

    .btn-add {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .btn-add:hover {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-add.added {
      background: var(--success);
      border-color: var(--success);
      color: var(--bg);
    }

    /* Cart Panel */
    .cart-panel {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100vh;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }
    .cart-panel.open { transform: translateX(0); }

    .cart-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .close-btn:hover { color: var(--text); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
    }
    .cart-items::-webkit-scrollbar { width: 4px; }
    .cart-items::-webkit-scrollbar-track { background: transparent; }
    .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cart-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-icon {
      width: 52px; height: 52px;
      background: var(--surface);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .cart-item-price { font-size: 0.8rem; color: var(--accent); }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .qty-btn {
      width: 22px; height: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
    .qty-num { font-size: 0.8rem; min-width: 20px; text-align: center; }
    .remove-item {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0;
      transition: color 0.2s;
    }
    .remove-item:hover { color: var(--danger); }

    .cart-empty {
      text-align: center;
      color: var(--muted);
      padding: 3rem 0;
      font-size: 0.85rem;
    }
    .cart-empty .empty-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

    .cart-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
    }
    .cart-total-price { font-size: 1.3rem; color: var(--accent); }

    .btn-checkout {
      width: 100%;
      background: var(--accent);
      border: none;
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 1rem;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-checkout:hover {
      background: #33eaff;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.8rem;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* SW status */
    .sw-status {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .sw-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .sw-dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .no-results {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
    }
    .no-results .no-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

    @media (max-width: 640px) {
      header { padding: 0 1rem; }
      main { padding: 1rem; }
      .hero { padding: 3rem 0 2rem; }
      .cart-panel { width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VOLT<span>EX</span></div>
    <nav>
      <button class="nav-btn active" onclick="showSection('catalog')">Каталог</button>
      <button class="nav-btn" onclick="showSection('about')">О нас</button>
    </nav>
    <button class="cart-btn" onclick="toggleCart()">
      🛒 КОРЗИНА
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </header>

  <div class="overlay" id="overlay" onclick="toggleCart()"></div>

  <div class="cart-panel" id="cart-panel">
    <div class="cart-header">
      <div class="cart-title">КОРЗИНА</div>
      <button class="close-btn" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer" id="cart-footer" style="display:none">
      <div class="cart-total">
        <span>ИТОГО</span>
        <span class="cart-total-price" id="cart-total">0 ₽</span>
      </div>
      <button class="btn-checkout" onclick="checkout()">ОФОРМИТЬ ЗАКАЗ</button>
    </div>
  </div>

  <main id="main-content"></main>

  <div class="toast" id="toast"></div>
  <div class="sw-status" id="sw-status">
    <div class="sw-dot" id="sw-dot"></div>
    <span id="sw-text">SERVICE WORKER</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
